vaadin.launch-browser=true
spring.application.name=maestrao
spring.main.banner-mode=off
spring.main.log-startup-info=false

spring.datasource.url=jdbc:h2:mem:mydb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update

maestrao.security.admin.username=admin
maestrao.security.admin.password=admin

# Keep framework logs quiet; app logs stay at INFO.
logging.level.org.springframework=ERROR
logging.level.com.vaadin=ERROR
logging.level.org.hibernate=ERROR
logging.level.org.quartz=ERROR
logging.level.org.apache=ERROR
logging.level.org.atmosphere=ERROR
logging.level.com.zaxxer=ERROR
logging.level.com.allanvital.maestrao=INFO

# Development key only. Override in production using an environment-specific property.
# Generate a new AES-256 key with: openssl rand -base64 32
maestrao.credentials.encryption-key=y8/wrkv9eKRIP3IPaNiMHomosqPN5EDfkA9hxkL/l4k=

# Keep ingested log lines for N days
maestrao.logs.retention-days=7

# Fixed delay between reconnect attempts for log collectors
maestrao.logs.collector.reconnect-delay-ms=2000

# Collector heartbeat (INFO)
maestrao.logs.collector.heartbeat-ms=300000

# Jobs
maestrao.jobs.timeout-ms=43200000
maestrao.jobs.max-output-bytes=262144

# Quartz (jobs scheduling)
spring.quartz.job-store-type=jdbc
spring.quartz.jdbc.initialize-schema=always
spring.quartz.properties.org.quartz.threadPool.threadCount=2

# Artifact proxy cache
maestrao.artifact-proxy.enabled=true
maestrao.artifact-proxy.cache-root=./data/artifact-cache
maestrao.artifact-proxy.max-inflight-fetches=3
maestrao.artifact-proxy.connect-timeout-ms=2000
maestrao.artifact-proxy.read-timeout-ms=10000
maestrao.artifact-proxy.negative-cache-ttl-seconds=120
maestrao.artifact-proxy.metadata.update-policy=interval:5
maestrao.artifact-proxy.metadata.conditional-revalidate=true
maestrao.artifact-proxy.metadata.serve-stale-on-error=true
maestrao.artifact-proxy.metadata.max-stale-minutes=1440
maestrao.artifact-proxy.cleanup.enabled=false
maestrao.artifact-proxy.cleanup.max-size-gb=50
maestrao.artifact-proxy.cleanup.max-idle-days=30
